<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#166534"/>
  <!-- Needle body -->
  <rect x="30" y="8" width="4" height="28" rx="2" fill="#ffffff"/>
  <!-- Needle eye -->
  <ellipse cx="32" cy="10" rx="2.5" ry="1.5" fill="#166534" stroke="#166534" stroke-width="0.5"/>
  <!-- Needle point -->
  <polygon points="30,36 34,36 32,44" fill="#ffffff"/>
  <!-- Thread spool base -->
  <rect x="20" y="46" width="24" height="12" rx="4" fill="#4ade80"/>
  <!-- Thread spool caps -->
  <rect x="18" y="44" width="28" height="4" rx="2" fill="#bbf7d0"/>
  <rect x="18" y="54" width="28" height="4" rx="2" fill="#bbf7d0"/>
  <!-- Thread on spool -->
  <line x1="26" y1="47" x2="26" y2="57" stroke="#166534" stroke-width="1.5" stroke-dasharray="2 2"/>
  <line x1="30" y1="47" x2="30" y2="57" stroke="#166534" stroke-width="1.5" stroke-dasharray="2 2"/>
  <line x1="34" y1="47" x2="34" y2="57" stroke="#166534" stroke-width="1.5" stroke-dasharray="2 2"/>
  <line x1="38" y1="47" x2="38" y2="57" stroke="#166534" stroke-width="1.5" stroke-dasharray="2 2"/>
  <!-- Thread line from needle to spool -->
  <path d="M 32 44 Q 38 45 38 47" stroke="#bbf7d0" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
